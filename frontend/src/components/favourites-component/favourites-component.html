<section class="favorites-section">
  <h2 class="section-title">I Tuoi Preferiti</h2>

  <div class="favorites-scroll">
    @for (movie of movies; track movie.title) {
      <div class="movie-card">
        <div class="movie-poster" [style.background-image]="'url(' + movie.posterUrl + ')'">
          <div class="rating-banner">
            <div class="rating-stars">
              @for (star of stars; track star) {
                <svg viewBox="0 0 24 24" width="10" height="10" [attr.fill]="star <= movie.rating ? '#ff7a45' : '#4a5668'">
                  <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
              }
            </div>
            <span class="rating-value">{{ movie.rating }}/5</span>
          </div>
        </div>
        <span class="movie-title">{{ movie.title.toUpperCase() }}</span>
      </div>
    }
  </div>
</section>
